# LibreChat Configuration File

# Based on librechat.example.yaml
# For more information, see the Configuration Guide:
# https://www.librechat.ai/docs/configuration/librechat_yaml

# Configuration version (required)
version: 1.2.1

# Railway deployment settings
host: '0.0.0.0'
port: ${PORT:-3080}

# Cache settings: Set to true to enable caching
cache: true

# Custom interface configuration
interface:
  customWelcome: 'Welcome to LibreChat! Enjoy your experience.'
  # Enable/disable file search as a chatarea selection (default: true)
  fileSearch: true
  # Privacy policy settings
  privacyPolicy:
    externalUrl: 'https://librechat.ai/privacy-policy'
    openNewTab: true

  # Terms of service
  termsOfService:
    externalUrl: 'https://librechat.ai/tos'
    openNewTab: true
    modalAcceptance: true
    modalTitle: 'Terms of Service for LibreChat'
    modalContent: |
      # Terms and Conditions for LibreChat

      *Effective Date: February 18, 2024*

      Welcome to LibreChat! By using this service, you agree to these terms.

      ## 1. Usage Terms
      - Use this service responsibly and ethically
      - Do not violate any applicable laws or regulations
      - Respect other users and maintain appropriate conduct

      ## 2. Data and Privacy
      - Your conversations may be stored for service improvement
      - We respect your privacy and follow data protection standards
      - You can request data deletion at any time

      ## 3. Service Availability
      - We strive to maintain high uptime but cannot guarantee 100% availability
      - Features may be added, modified, or removed with notice

      ## 4. Contact
      For questions about these terms, please contact the administrator.

  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  prompts: true
  bookmarks: true
  multiConvo: true
  agents: true
  peoplePicker:
    users: true
    groups: true
    roles: true
  marketplace:
      use: false
  fileCitations: true

# Registration settings
registration:
  socialLogins: ['github', 'google', 'discord', 'openid']
