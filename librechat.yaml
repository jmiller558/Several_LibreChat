# LibreChat Configuration File - SeveralX Consulting
# Version: 1.2.1

version: 1.2.1
cache: true

# Custom interface configuration for SeveralX Consulting
interface:
  customWelcome: 'Welcome to SeveralX Consulting AI! Get expert insights on AI implementation costs, technology recommendations, and strategic planning for your business.'

  # Simplified UI for consulting use case
  modelSelect: false        # Hide model selector
  endpointsMenu: false      # Hide endpoint selector
  parameters: false         # Hide model parameters
  sidePanel: true
  presets: false
  prompts: true
  bookmarks: true
  multiConvo: false
  fileSearch: true
  agents: false
  memories: true           # Enable memories feature
  temporaryChat: true      # Enable temporary chat
  runCode: true            # Enable code execution
  webSearch: true          # Enable web search

  peoplePicker:
    users: false
    groups: false
    roles: false

  marketplace:
    use: false

  fileCitations: true

# Registration settings
registration:
  socialLogins: []  # Disable social logins for consulting use case

# Actions configuration
actions:
  allowedDomains:
    - 'severalxconsulting.com'
    - 'api.github.com'

# File configuration
fileConfig:
  endpoints:
    default:
      totalSizeLimit: 20  # MB
  serverFileSizeLimit: 100  # MB
  avatarSizeLimit: 2  # MB
  imageGeneration:
    percentage: 100
    px: 1024

endpoints:
  openAI:
    order: 1
    type: openAI
    userProvide: false
    iconURL: '/assets/logo.png'

modelSpecs:
  prioritize: true
  addedEndpoints:
    - openAI
  list:
    - name: severalx-default-openai
      label: SeveralX Consulting AI
      iconURL: '/assets/logo.png'
      default: true
      preset:
        endpoint: openAI
        model: gpt-4o-mini
        modelLabel: SeveralX Consulting AI
        chatGptLabel: SeveralX Consulting AI
        temperature: 0.7

mcpServers:
  notion:
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-notion"
    timeout: 60000
    chatMenu: true
    customUserVars:
      NOTION_API_KEY:
        title: "Notion Integration Token"
        description: "Create an integration in Notion and paste the shared token here so LibreChat can access your workspace."
