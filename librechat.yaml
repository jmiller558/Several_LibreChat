# Actions configuration
actions:
  allowedDomains:
    - 'swapi.dev'
    - 'librechat.ai'
    - 'google.com'
    - 'api.github.com'
    - 'httpbin.org'

# MCP Servers Configuration
# Configure your Model Context Protocol servers here
mcpServers:
  # File system MCP server - provides file operations
  filesystem:
    type: stdio
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - /app/uploads  # Adjust path as needed
    timeout: 60000
    startup: true
    chatMenu: true
    serverInstructions: true
    
  # Web scraping MCP server - provides web browsing capabilities
  puppeteer:
    type: stdio
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-puppeteer"
    timeout: 300000
    startup: true
    chatMenu: true
    serverInstructions: "Use this server for web scraping and browser automation tasks."
    
  # Notion MCP server - provides Notion workspace integration
  notion:
    type: stdio
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-notion"
    timeout: 60000
    startup: true
    chatMenu: true
    serverInstructions: "Use this server to read, write, and manage your Notion pages and databases."
    env:
      NOTION_API_KEY: ${NOTION_API_KEY}
    customUserVars:
      - key: "NOTION_API_KEY"
        label: "Notion Integration Token"
        description: "Your Notion integration token for API access"
        required: true
  # Example: Custom MCP server via HTTP/SSE
  # custom-server:
  #   type: sse
  #   url: ${MCP_SERVER_URL}
  #   timeout: 60000
  #   startup: true
  #   chatMenu: true
  #   serverInstructions: "Custom MCP server for specialized tasks."
  #   customUserVars:
  #     - key: "API_KEY"
  #       label: "API Key"
  #       description: "Your API key for the custom server"
  #       required: true
  
  # Example: Obsidian MCP server (uncomment if you use Obsidian)
  # obsidian:
  #   type: stdio
  #   command: npx
  #   args:
  #     - -y
  #     - "mcp-obsidian"
  #     - /path/to/your/obsidian/vault
  #   timeout: 60000
  #   startup: true
  #   chatMenu: true
  #   serverInstructions: "Access and manage your Obsidian vault."

# Custom endpoints configuration
endpoints:
  # Assistants endpoint configuration
  # assistants:
  #   disableBuilder: false
  #   pollIntervalMs: 3000
  #   timeoutMs: 180000
  #   retrievalModels: ["gpt-4-turbo-preview"]
  #   capabilities: ["code_interpreter", "retrieval", "actions", "tools", "image_vision"]

  # Agents endpoint configuration
  # agents:
  #   recursionLimit: 50
  #   maxRecursionLimit: 100
  #   disableBuilder: false
  #   maxCitations: 30
  #   maxCitationsPerFile: 7
  #   minRelevanceScore: 0.45
  #   capabilities: ["execute_code", "file_search", "actions", "tools"]

  # Custom endpoint examples
  custom:
    # OpenAI-compatible endpoint
    - name: 'OpenAI'
      apiKey: '${OPENAI_API_KEY}'
      baseURL: 'https://api.openai.com/v1'
      models:
        default: ['gpt-4', 'gpt-4-turbo-preview', 'gpt-3.5-turbo']
        fetch: false
      titleConvo: true
      titleModel: 'gpt-3.5-turbo'
      modelDisplayLabel: 'OpenAI'

    # Anthropic endpoint
    - name: 'Anthropic'
      apiKey: '${ANTHROPIC_API_KEY}'
      baseURL: 'https://api.anthropic.com'
      models:
        default: ['claude-3-opus-20240229', 'claude-3-sonnet-20240229', 'claude-3-haiku-20240307']
        fetch: false
      titleConvo: true
      titleModel: 'claude-3-haiku-20240307'
      modelDisplayLabel: 'Claude'

    # Example: Local Ollama endpoint
    # - name: 'Ollama'
    #   apiKey: 'dummy-key'
    #   baseURL: 'http://localhost:11434/v1'
    #   models:
    #     default: ['llama2', 'codellama', 'mistral']
    #     fetch: true
    #   titleConvo: true
    #   titleModel: 'llama2'
    #   modelDisplayLabel: 'Ollama'

# File configuration
fileConfig:
  endpoints:
    assistants:
      fileLimit: 5
      fileSizeLimit: 10  # MB
      totalSizeLimit: 50  # MB
      supportedMimeTypes:
        - "image/.*"
        - "application/pdf"
        - "text/.*"
    openAI:
      fileLimit: 10
      fileSizeLimit: 25  # MB
      totalSizeLimit: 100  # MB
    default:
      totalSizeLimit: 20  # MB
  serverFileSizeLimit: 100  # MB
  avatarSizeLimit: 2  # MB
  imageGeneration:
    percentage: 100
    px: 1024

